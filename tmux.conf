set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z 5

set-option -g status-position top

set -g mouse on

bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

set-window-option -g mode-keys vi


bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Plugins ────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tema Tokyo Night (substitui o jimeh/tmux-themepack que foi removido)
# Após qualquer mudança aqui, rode: prefix + I para reinstalar os plugins
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Variante do tema: night (mais escuro), storm, moon ou day (claro)
set -g @tokyo-night-tmux_theme night

# Desativa relógio e data na statusbar (ative com 1 se quiser)
set -g @tokyo-night-tmux_show_datetime 0

# Remove o ícone de terminal (requer Nerd Font — sem a fonte aparece como '?')
# Deixando vazio, apenas o índice e o nome da window são exibidos
set -g @tokyo-night-tmux_terminal_icon ""
set -g @tokyo-night-tmux_active_terminal_icon ""

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ─── Configurações de plugins ────────────────────────────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Iniciar a numeração das janelas em 1
set -g base-index 1

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
